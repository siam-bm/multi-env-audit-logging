[SERVICE]
    Flush        2
    Log_Level    info
    Daemon       Off
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /logs/audit.json
    Tag               audit.${APP_ENV}
    Parser            json
    DB                /tmp/audit-${APP_ENV}.db
    Refresh_Interval  5
    Read_from_Head    On

[INPUT]
    Name              tail
    Path              /logs/error.log
    Tag               error.${APP_ENV}
    Parser            apache_error
    DB                /tmp/error-${APP_ENV}.db
    Refresh_Interval  5

[INPUT]
    Name              tail
    Path              /logs/app.log
    Tag               app.${APP_ENV}
    Parser            json
    DB                /tmp/app-${APP_ENV}.db
    Refresh_Interval  5

# Add environment and metadata to all logs
[FILTER]
    Name         record_modifier
    Match        audit.*
    Record       environment ${APP_ENV}
    Record       system ${SYSTEM_NAME}
    Record       container_name ${HOSTNAME}
    Record       log_type audit

[FILTER]
    Name         record_modifier
    Match        error.*
    Record       environment ${APP_ENV}
    Record       system ${SYSTEM_NAME}
    Record       container_name ${HOSTNAME}
    Record       log_type error

[FILTER]
    Name         record_modifier
    Match        app.*
    Record       environment ${APP_ENV}
    Record       system ${SYSTEM_NAME}
    Record       container_name ${HOSTNAME}
    Record       log_type application

# Add timestamp if missing
[FILTER]
    Name         lua
    Match        *
    script       timestamp.lua
    call         add_timestamp

# Output to OpenSearch with environment-specific index
[OUTPUT]
    Name            es
    Match           audit.*
    Host            ${OPENSEARCH_HOST}
    Port            ${OPENSEARCH_PORT}
    Index           audit-${APP_ENV}
    Type            _doc
    Logstash_Format On
    Logstash_Prefix audit-${APP_ENV}
    Logstash_DateFormat %Y.%m.%d
    Suppress_Type_Name On
    Retry_Limit     5
    tls             Off
    tls.verify      Off

[OUTPUT]
    Name            es
    Match           error.*
    Host            ${OPENSEARCH_HOST}
    Port            ${OPENSEARCH_PORT}
    Index           logs-${APP_ENV}
    Type            _doc
    Logstash_Format On
    Logstash_Prefix logs-${APP_ENV}
    Logstash_DateFormat %Y.%m.%d
    Suppress_Type_Name On
    Retry_Limit     5

[OUTPUT]
    Name            es
    Match           app.*
    Host            ${OPENSEARCH_HOST}
    Port            ${OPENSEARCH_PORT}
    Index           app-${APP_ENV}
    Type            _doc
    Logstash_Format On
    Logstash_Prefix app-${APP_ENV}
    Logstash_DateFormat %Y.%m.%d
    Suppress_Type_Name On
    Retry_Limit     5

# Debug output (optional)
[OUTPUT]
    Name   stdout
    Match  *
    Format json_lines